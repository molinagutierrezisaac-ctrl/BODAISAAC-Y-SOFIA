<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Isaac y Sofía</title>

<style>
  /* Estilos generales */
  body {
    margin: 0;
    background: #f5f0eb;
    display: flex;
    justify-content: center;
    font-family: 'Georgia', serif;
  }

  .container {
    position: relative;
    width: 300px; /* Ajusta según tu diseño */
  }

  /* Imagen de invitación */
  .container img {
    width: 100%;
    height: auto;
    border-radius: 15px;
    display: block;
    image-rendering: auto;
  }

  /* Contador */
  #countdown {
    position: absolute;
    top: 880px; /* Ajusta según tu diseño */
    width: 100%;
    text-align: center;
    color: #a67c52;
    font-size: 16px;
    letter-spacing: 2px;
  }

  /* Botones invisibles */
  .btn-invisible {
    position: absolute;
    cursor: pointer;
    background: rgba(0,0,0,0); /* completamente invisible */
  }
</style>
</head>
<body>

<div class="container">

  <!-- Imagen de invitación -->
  <img src="Invitación Isaac y Sofia.png" alt="Invitación Isaac y Sofía">

  <!-- Contador -->
  <div id="countdown"></div>

  <!-- Botón invisible para música (sobre icono play) -->
  <div class="btn-invisible"
       onclick="document.getElementById('audio').play()"
       style="top:1050px; left:50%; transform:translateX(-50%); width:80px; height:80px;">
  </div>

  <!-- Botón invisible para ubicación (sobre icono ubicación) -->
  <a href="https://maps.app.goo.gl/FT7mFgKbXzcSF8Wh7" target="_blank"
     class="btn-invisible"
     style="top:1220px; left:50%; transform:translateX(-50%); width:140px; height:40px; display:block;">
  </a>

</div>

<!-- Reproductor de audio -->
<audio id="audio">
  <source src="canción.mp3" type="audio/mpeg">
  Tu navegador no soporta audio.
</audio>

<!-- Script contador -->
<script>
var countDownDate = new Date("Jul 25, 2026 18:30:00").getTime();

var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    days + " DÍAS " + hours + " HRS " + minutes + " MIN";

  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "¡ES HOY!";
  }
}, 1000);
</script>

</body>
</html>
